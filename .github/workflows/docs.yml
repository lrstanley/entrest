name: docs

on:
  pull_request:
    branches: [master]
    paths: ["docs/**"]
    types: [opened, edited, reopened, synchronize, unlocked]
  push:
    branches: [master]
    paths: ["docs/**"]

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: lrstanley/.github/composite/install-node@master
      - run: make docs-build
      - if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/dist/
      - if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name != 'pull_request' }}
        id: deployment
        uses: actions/deploy-pages@v5
